services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"


  db:
    image: postgres:15
    ports:
          - "5432:5432"
    environment: 
        POSTGRES_USER: admin
        POSTGRES_PASSWORD: password
        POSTGRES_DB: task_manager
    volumes:
          - pgdata:/var/lib/postgresql/data


volumes:
  pgdata: